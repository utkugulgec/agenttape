services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agenttape
      POSTGRES_USER: agenttape
      POSTGRES_PASSWORD: agenttape
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenttape -d agenttape"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    environment:
      DATABASE_URL: postgres://agenttape:agenttape@postgres:5432/agenttape?sslmode=disable
      HTTP_PORT: "8080"
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - server

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
